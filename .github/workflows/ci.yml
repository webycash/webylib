name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Test matrix ──────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: MSVC setup (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --no-default-features --features bundled-sqlite,cli -- -D warnings

      - name: Build
        run: cargo build --no-default-features --features bundled-sqlite,cli

      - name: Unit tests
        run: cargo test --no-default-features --features bundled-sqlite,cli --test unit_tests

      - name: Build FFI
        run: cargo build --no-default-features --features bundled-sqlite,ffi

  # ── Mobile compile check ─────────────────────────────────────────
  mobile-check:
    name: Mobile check (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-ios
            runner: macos-latest
          - target: aarch64-apple-ios-sim
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Check (library only)
        run: cargo check --target ${{ matrix.target }} --lib --no-default-features --features bundled-sqlite

  # ── FreeBSD ──────────────────────────────────────────────────────
  test-freebsd:
    name: Test (FreeBSD)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build & test on FreeBSD
        uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: freebsd
          version: '14.2'
          run: |
            sudo pkg install -y curl
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            . $HOME/.cargo/env
            cargo build --release --no-default-features --features bundled-sqlite,cli
            cargo test --release --no-default-features --features bundled-sqlite,cli --test unit_tests

  # ── MSRV ─────────────────────────────────────────────────────────
  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - run: cargo build --no-default-features --features bundled-sqlite

  # ── Integration tests ────────────────────────────────────────────
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Integration tests
        env:
          TEST_WEBCASH_SECRET: ${{ secrets.TEST_WEBCASH_SECRET }}
        run: cargo test --test integration_tests
        if: env.TEST_WEBCASH_SECRET != ''

  # ── Release builds ───────────────────────────────────────────────
  release:
    name: Release (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Desktop / Server — native builds
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            features: bundled-sqlite,cli,ffi
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            features: bundled-sqlite,cli,ffi
          - target: x86_64-apple-darwin
            runner: macos-latest
            features: bundled-sqlite,cli,ffi
          - target: aarch64-apple-darwin
            runner: macos-latest
            features: bundled-sqlite,cli,ffi
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            features: bundled-sqlite,cli,ffi
          # Mobile — library only (no CLI), native cross from macOS/Linux
          - target: aarch64-apple-ios
            runner: macos-latest
            features: bundled-sqlite,ffi
            lib_only: true
          - target: aarch64-apple-ios-sim
            runner: macos-latest
            features: bundled-sqlite,ffi
            lib_only: true
          - target: aarch64-linux-android
            runner: ubuntu-latest
            features: bundled-sqlite,ffi
            lib_only: true
            android: true
          - target: armv7-linux-androideabi
            runner: ubuntu-latest
            features: bundled-sqlite,ffi
            lib_only: true
            android: true
          - target: x86_64-linux-android
            runner: ubuntu-latest
            features: bundled-sqlite,ffi
            lib_only: true
            android: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: MSVC setup (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Android NDK
        if: matrix.android
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27

      - name: Configure Android toolchain
        if: matrix.android
        shell: bash
        run: |
          NDK="${{ steps.ndk.outputs.ndk-path }}"
          TOOLCHAIN="${NDK}/toolchains/llvm/prebuilt/linux-x86_64"
          # Map Rust target to NDK clang prefix (with API level for linker)
          case "${{ matrix.target }}" in
            aarch64-linux-android)   CLANG_PREFIX="aarch64-linux-android24" ; BARE_PREFIX="aarch64-linux-android" ;;
            armv7-linux-androideabi) CLANG_PREFIX="armv7a-linux-androideabi24" ; BARE_PREFIX="arm-linux-androideabi" ;;
            x86_64-linux-android)   CLANG_PREFIX="x86_64-linux-android24" ; BARE_PREFIX="x86_64-linux-android" ;;
          esac
          CC="${TOOLCHAIN}/bin/${CLANG_PREFIX}-clang"
          AR="${TOOLCHAIN}/bin/llvm-ar"
          RANLIB="${TOOLCHAIN}/bin/llvm-ranlib"
          # Cargo target env (uppercase, hyphens → underscores)
          ENV_TARGET=$(echo "${{ matrix.target }}" | tr 'a-z-' 'A-Z_')
          echo "CC_${ENV_TARGET}=${CC}" >> "$GITHUB_ENV"
          echo "AR_${ENV_TARGET}=${AR}" >> "$GITHUB_ENV"
          echo "RANLIB_${ENV_TARGET}=${RANLIB}" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_${ENV_TARGET}_LINKER=${CC}" >> "$GITHUB_ENV"
          # ring/cc crate looks for bare tool names — add NDK bin to PATH
          echo "${TOOLCHAIN}/bin" >> "$GITHUB_PATH"
          # Create symlinks for bare tool names that ring expects
          ln -sf "${CC}" "${TOOLCHAIN}/bin/${BARE_PREFIX}-clang"
          ln -sf "${TOOLCHAIN}/bin/llvm-ar" "${TOOLCHAIN}/bin/${BARE_PREFIX}-ar"

      - name: Build (desktop with CLI)
        if: "!matrix.lib_only"
        run: cargo build --release --target ${{ matrix.target }} --no-default-features --features ${{ matrix.features }}

      - name: Build (library only)
        if: matrix.lib_only
        run: cargo build --release --target ${{ matrix.target }} --lib --no-default-features --features ${{ matrix.features }}

      - name: Package release
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARGET="${{ matrix.target }}"
          STAGING="webylib-${VERSION}-${TARGET}"
          mkdir -p "$STAGING"
          cp LICENSE README.md CHANGELOG.md "$STAGING/"

          if [ "${{ matrix.lib_only }}" = "true" ]; then
            find "target/${TARGET}/release" -maxdepth 1 \
              \( -name '*.a' -o -name '*.so' -o -name '*.dylib' -o -name '*.dll' -o -name '*.lib' \) \
              -exec cp {} "$STAGING/" \;
          else
            if [ "${{ runner.os }}" = "Windows" ]; then
              cp "target/${TARGET}/release/webyc.exe" "$STAGING/"
            else
              cp "target/${TARGET}/release/webyc" "$STAGING/" 2>/dev/null || true
            fi
            find "target/${TARGET}/release" -maxdepth 1 \
              \( -name '*.a' -o -name '*.so' -o -name '*.dylib' -o -name '*.dll' -o -name '*.lib' \) \
              -exec cp {} "$STAGING/" \;
          fi

          tar czf "${STAGING}.tar.gz" "$STAGING"
          # sha256sum works on Linux and Git Bash (Windows); shasum on macOS
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${STAGING}.tar.gz" > "${STAGING}.tar.gz.sha256"
          else
            shasum -a 256 "${STAGING}.tar.gz" > "${STAGING}.tar.gz.sha256"
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            webylib-*.tar.gz
            webylib-*.tar.gz.sha256

  # ── Publish to crates.io ─────────────────────────────────────────
  # Sub-crates are published in topological dependency order before the
  # root webylib crate. 30 s sleeps keep us under crates.io's new-crate
  # rate limit. Already-published versions are skipped (idempotent).
  publish-crate:
    name: Publish to crates.io
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, msrv]
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Publish all crates in topological order
        run: |
          # pub(): publish one crate, retrying on rate-limit (429).
          # - Parses "try again after <DATE>" from the error and sleeps
          #   exactly until then (+30 s buffer) using GNU date -d.
          # - Treats "already uploaded" as success (idempotent re-runs).
          pub() {
            local max_retries=10 attempt=0
            while [ $attempt -lt $max_retries ]; do
              local out ec
              out=$(cargo publish "$@" 2>&1); ec=$?
              echo "$out"
              [ $ec -eq 0 ] && return 0
              echo "$out" | grep -q "already uploaded" && return 0
              if echo "$out" | grep -q "Too Many Requests"; then
                local retry_str wait_secs
                retry_str=$(echo "$out" | grep -oP '(?<=try again after ).*(?= and see)')
                if [ -n "$retry_str" ]; then
                  wait_secs=$(( $(date -d "$retry_str" +%s) - $(date +%s) + 30 ))
                else
                  wait_secs=660
                fi
                [ $wait_secs -lt 0 ] && wait_secs=30
                echo "Rate limited — sleeping ${wait_secs}s (until '${retry_str:-unknown}')..."
                sleep "$wait_secs"
                attempt=$((attempt + 1))
                continue
              fi
              return 1
            done
            echo "Exceeded $max_retries retries"; return 1
          }

          # Topological order — leaf → … → root.
          # cargo publish itself waits for crates.io to confirm each
          # upload before returning, so no extra sleep is needed for
          # index propagation.

          pub -p webylib-macros
          pub -p webylib-crypto
          pub -p webylib-storage
          pub -p webylib-proto-client
          pub -p webylib-auth

          pub -p webylib-hd
          pub -p webylib-server-client

          pub -p webylib-core

          pub -p webylib-wallet-webcash
          pub -p webylib-wallet-rgb
          pub -p webylib-wallet-voucher

          pub --no-default-features --features bundled-sqlite
